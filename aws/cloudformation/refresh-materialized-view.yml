AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template for materialized view refresh Lambda function'

Parameters:
  DBHost:
    Type: String
    Description: Database host
    Default: health-platform-dev-db.c5njva4wrrhe.us-east-1.rds.amazonaws.com
  
  DBName:
    Type: String
    Description: Database name
    Default: health_platform_dev
  
  DBUser:
    Type: String
    Description: Database user
    Default: healthadmin
  
  DBPassword:
    Type: String
    Description: Database password
    NoEcho: true
  
  ScheduleExpression:
    Type: String
    Description: Schedule expression for the EventBridge rule
    Default: cron(0 4 * * ? *) # Run at 4:00 AM UTC every day

Resources:
  # IAM Role for Lambda function
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: LambdaRDSAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - rds-db:connect
                Resource: '*'

  # Lambda function to refresh materialized view
  RefreshMaterializedViewFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: refresh-materialized-view
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Runtime: nodejs20.x
      Timeout: 30
      MemorySize: 128
      Environment:
        Variables:
          DB_HOST: !Ref DBHost
          DB_NAME: !Ref DBName
          DB_USER: !Ref DBUser
          DB_PASSWORD: !Ref DBPassword
      Code:
        ZipFile: |
          const { Client } = require('pg');

          // Database connection configuration
          const dbConfig = {
            host: process.env.DB_HOST,
            port: process.env.DB_PORT || 5432,
            database: process.env.DB_NAME,
            user: process.env.DB_USER,
            password: process.env.DB_PASSWORD,
            ssl: {
              rejectUnauthorized: false
            }
          };

          exports.handler = async (event) => {
            console.log('Starting materialized view refresh');
            
            let client;
            try {
              // Connect to the database
              client = new Client(dbConfig);
              await client.connect();
              console.log('Connected to database');
              
              // Refresh the materialized view
              console.log('Refreshing materialized view: mat_food_search');
              await client.query('REFRESH MATERIALIZED VIEW mat_food_search');
              console.log('Materialized view refreshed successfully');
              
              return {
                statusCode: 200,
                body: JSON.stringify({
                  message: 'Materialized view refreshed successfully',
                  timestamp: new Date().toISOString()
                })
              };
            } catch (error) {
              console.error('Error refreshing materialized view:', error);
              return {
                statusCode: 500,
                body: JSON.stringify({
                  message: 'Error refreshing materialized view',
                  error: error.message,
                  timestamp: new Date().toISOString()
                })
              };
            } finally {
              // Close the database connection
              if (client) {
                await client.end();
                console.log('Database connection closed');
              }
            }
          };
      Layers:
        - !Ref PgLayer

  # Lambda Layer for pg module
  PgLayer:
    Type: AWS::Lambda::LayerVersion
    Properties:
      LayerName: pg-layer
      Description: Layer containing pg module
      Content:
        ZipFile: |
          mkdir -p nodejs/node_modules
          cd nodejs
          npm init -y
          npm install pg
          cd ..
          zip -r layer.zip nodejs
      CompatibleRuntimes:
        - nodejs20.x

  # EventBridge rule to trigger Lambda on schedule
  ScheduledRule:
    Type: AWS::Events::Rule
    Properties:
      Name: refresh-materialized-view-daily
      Description: Triggers the Lambda function to refresh materialized view daily
      ScheduleExpression: !Ref ScheduleExpression
      State: ENABLED
      Targets:
        - Id: RefreshMaterializedViewFunction
          Arn: !GetAtt RefreshMaterializedViewFunction.Arn

  # Permission for EventBridge to invoke Lambda
  PermissionForEventsToInvokeLambda:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref RefreshMaterializedViewFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt ScheduledRule.Arn

Outputs:
  LambdaFunctionName:
    Description: Name of the Lambda function
    Value: !Ref RefreshMaterializedViewFunction
  
  LambdaFunctionArn:
    Description: ARN of the Lambda function
    Value: !GetAtt RefreshMaterializedViewFunction.Arn
  
  ScheduledRuleName:
    Description: Name of the EventBridge rule
    Value: !Ref ScheduledRule
