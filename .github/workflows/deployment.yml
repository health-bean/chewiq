# .github/workflows/deploymentyml
name: 📚Platform Deployment - Documentation & Backend Deployment

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'frontend/**'
      - 'backend/**' 
      - 'docs/**'
      - '*.js'
      - '*.json'
  pull_request:
    branches: [ main ]
  workflow_dispatch: # Allow manual trigger

jobs:
  # 🚀 NEW: Deploy Backend First
  deploy-backend:
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout Repository
      uses: actions/checkout@v4
      
    - name: 📦 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        
    - name: 🔧 Install Lambda Dependencies
      working-directory: backend/functions/api
      run: |
        echo "Installing production dependencies..."
        npm ci --only=production
        
    - name: 🔍 Verify handleCors Fix
      working-directory: backend/functions/api
      run: |
        echo "🔍 Verifying handleCors fix is present..."
        
        if grep -q "handleCors" utils/responses.js; then
          echo "✅ handleCors fix found in responses.js"
        else
          echo "❌ handleCors fix missing - this will cause deployment issues"
          exit 1
        fi
        
    - name: 🏗️ Create Lambda Deployment Package
      working-directory: backend/functions/api
      run: |
        echo "📦 Creating deployment package..."
        
        # Remove any existing deployment files
        rm -f deploy.zip lambda-deployment.zip
        
        # Create deployment package
        zip -r deploy.zip . \
          -x "*.git*" \
          -x "*.DS_Store*" \
          -x "*.backup*" \
          -x "node_modules/.cache/*" \
          -x "tests/*" \
          -x "*.md" \
          -x "*.log"
        
        # Verify package contents
        echo "📋 Deployment package contents:"
        unzip -l deploy.zip | head -20
        
    - name: 🔐 Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1
        
    - name: 🚀 Deploy to AWS Lambda
      working-directory: backend/functions/api
      run: |
        echo "🚀 Deploying to health-platform-dev Lambda function..."
        
        aws lambda update-function-code \
          --function-name health-platform-dev \
          --zip-file fileb://deploy.zip \
          --publish
        
        echo "✅ Lambda function deployed successfully"
        
    - name: 🧪 Test Lambda Deployment
      run: |
        echo "🧪 Testing Lambda deployment..."
        
        # Wait a moment for deployment to complete
        sleep 10
        
        # Test AI Correlation Engine
        echo "Testing AI Correlation Engine..."
        CORRELATION_RESPONSE=$(curl -s "https://suhoxvn8ik.execute-api.us-east-1.amazonaws.com/dev/api/v1/correlations/insights?userId=8e8a568a-c2f8-43a8-abf2-4e54408dbdc0")
        
        if echo "$CORRELATION_RESPONSE" | grep -q "error.*handleCors"; then
          echo "❌ handleCors error still present - deployment failed"
          exit 1
        else
          echo "✅ Lambda deployment successful - no handleCors errors"
        fi
        
    - name: 📊 Backend Deployment Summary
      run: |
        echo "## 🚀 Backend Deployment Complete" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 📊 Lambda Function Status:" >> $GITHUB_STEP_SUMMARY
        echo "- **Function Name:** health-platform-dev" >> $GITHUB_STEP_SUMMARY
        echo "- **Status:** ✅ Deployed and operational" >> $GITHUB_STEP_SUMMARY
        echo "- **API Gateway:** https://suhoxvn8ik.execute-api.us-east-1.amazonaws.com/dev/" >> $GITHUB_STEP_SUMMARY
        echo "- **Deployment Time:** $(date)" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 🎯 Platform Features:" >> $GITHUB_STEP_SUMMARY
        echo "- **✅ AI Correlation Engine:** 117 detected patterns" >> $GITHUB_STEP_SUMMARY
        echo "- **✅ Multi-Protocol Intelligence:** AIP + Low Histamine" >> $GITHUB_STEP_SUMMARY
        echo "- **✅ Environmental Tracking:** Mold, chemical, EMF" >> $GITHUB_STEP_SUMMARY
        echo "- **✅ Practitioner Integration:** Professional tools" >> $GITHUB_STEP_SUMMARY

  generate-documentation:
    needs: deploy-backend  # Wait for backend deployment
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout Repository
      uses: actions/checkout@v4
      
    - name: 📦 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        
    - name: 🔧 Install Documentation Dependencies
      working-directory: ./docs
      run: npm ci
      
    - name: 🔍 Auto-Discover & Generate Complete Documentation
      run: |
        node auto-discovery-docs-generator.js
        echo "✅ Complete documentation auto-generated from implementation"
        
    - name: 📊 Documentation Summary
      run: |
        echo "## 📊 Auto-Discovery Results" >> $GITHUB_STEP_SUMMARY
        
        # Count generated documentation files
        DOC_COUNT=$(find docs/docs -name "*.md" | wc -l)
        echo "- **Documentation Files:** ${DOC_COUNT}" >> $GITHUB_STEP_SUMMARY
        
        # Check for key files
        if [ -f "docs/docs/index.md" ]; then
          echo "- **✅ Platform Overview:** Generated" >> $GITHUB_STEP_SUMMARY
        fi
        
        if [ -f "docs/docs/api/overview.md" ]; then
          echo "- **✅ API Documentation:** Generated" >> $GITHUB_STEP_SUMMARY
        fi
        
        if [ -f "docs/docs/authentication/overview.md" ]; then
          echo "- **✅ Authentication Docs:** Generated" >> $GITHUB_STEP_SUMMARY
        else
          echo "- **ℹ️ Authentication:** Not implemented" >> $GITHUB_STEP_SUMMARY
        fi
        
        if [ -f "docs/docs/components/overview.md" ]; then
          echo "- **✅ Component Library:** Generated" >> $GITHUB_STEP_SUMMARY
        fi
        
        echo "- **🔄 Auto-Discovery:** Complete" >> $GITHUB_STEP_SUMMARY
        echo "- **📅 Generated:** $(date)" >> $GITHUB_STEP_SUMMARY
        
    - name: 🏗️ Build Documentation Site
      working-directory: ./docs
      run: |
        npm run build
        echo "✅ Documentation site built successfully"
        
    - name: 📋 Build Health Check
      working-directory: ./docs
      run: |
        echo "🔍 Verifying documentation build..."
        
        if [ -d "build" ]; then
          BUILD_SIZE=$(du -sh build | cut -f1)
          echo "✅ Build successful (${BUILD_SIZE})"
          
          # Check for essential pages
          if [ -f "build/index.html" ]; then
            echo "✅ Home page generated"
          fi
          
          if [ -f "build/api/overview/index.html" ]; then
            echo "✅ API documentation page generated"
          fi
          
          if [ -f "build/quick-start/index.html" ]; then
            echo "✅ Quick start page generated"
          fi
          
        else
          echo "❌ Build failed - no build directory created"
          exit 1
        fi
        
    - name: 📄 Upload Documentation Build
      uses: actions/upload-artifact@v4
      with:
        name: auto-generated-documentation
        path: docs/build/
        retention-days: 7

  deploy-documentation:
    needs: [deploy-backend, generate-documentation]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: 📥 Checkout Repository
      uses: actions/checkout@v4
      
    - name: 📥 Download Documentation Build
      uses: actions/download-artifact@v4
      with:
        name: auto-generated-documentation
        path: docs/build/
        
    - name: 🔍 Detect Custom Domain
      id: domain
      run: |
        if [ -f "docs/static/CNAME" ]; then
          echo "custom_domain=$(cat docs/static/CNAME)" >> $GITHUB_OUTPUT
          echo "Custom domain detected: $(cat docs/static/CNAME)"
        elif [ -f "CNAME" ]; then
          echo "custom_domain=$(cat CNAME)" >> $GITHUB_OUTPUT
          echo "Custom domain detected: $(cat CNAME)"
        else
          echo "custom_domain=" >> $GITHUB_OUTPUT
          echo "No custom domain detected - using GitHub Pages default"
        fi
    
    - name: 🚀 Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./docs/build
        cname: ${{ steps.domain.outputs.custom_domain }}
        
    - name: 📊 Deployment Summary
      run: |
        echo "## 🚀 Documentation Deployed Successfully" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        # Dynamic URL based on repository and custom domain
        if [ -n "${{ steps.domain.outputs.custom_domain }}" ]; then
          DOCS_URL="https://${{ steps.domain.outputs.custom_domain }}/"
        else
          DOCS_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"
        fi
        
        echo "### 📖 Documentation Links:" >> $GITHUB_STEP_SUMMARY
        echo "- **🏠 Documentation Home:** ${DOCS_URL}" >> $GITHUB_STEP_SUMMARY
        echo "- **🚀 Quick Start:** ${DOCS_URL}quick-start" >> $GITHUB_STEP_SUMMARY
        echo "- **🌐 API Reference:** ${DOCS_URL}api/overview" >> $GITHUB_STEP_SUMMARY
        echo "- **⚛️ Components:** ${DOCS_URL}components/overview" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        echo "### 📊 Deployment Info:" >> $GITHUB_STEP_SUMMARY
        echo "- **Status:** ✅ Live and updated" >> $GITHUB_STEP_SUMMARY
        echo "- **Source:** Auto-generated from live implementation" >> $GITHUB_STEP_SUMMARY
        echo "- **Build Time:** $(date)" >> $GITHUB_STEP_SUMMARY
        echo "- **Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY

  notify-completion:
    needs: [deploy-backend, generate-documentation, deploy-documentation]
    runs-on: ubuntu-latest
    if: always()
    
    steps:
    - name: 📋 Final Workflow Summary
      run: |
        echo "## 🎯 Complete Platform Deployment Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        if [ "${{ needs.deploy-backend.result }}" == "success" ]; then
          echo "- ✅ **Backend Deployment:** Success" >> $GITHUB_STEP_SUMMARY
        else
          echo "- ❌ **Backend Deployment:** Failed" >> $GITHUB_STEP_SUMMARY
        fi
        
        if [ "${{ needs.generate-documentation.result }}" == "success" ]; then
          echo "- ✅ **Documentation Generation:** Success" >> $GITHUB_STEP_SUMMARY
        else
          echo "- ❌ **Documentation Generation:** Failed" >> $GITHUB_STEP_SUMMARY
        fi
        
        if [ "${{ needs.deploy-documentation.result }}" == "success" ]; then
          echo "- ✅ **Documentation Deployment:** Success" >> $GITHUB_STEP_SUMMARY
        elif [ "${{ needs.deploy-documentation.result }}" == "skipped" ]; then
          echo "- ⏭️ **Documentation Deployment:** Skipped (not main branch)" >> $GITHUB_STEP_SUMMARY
        else
          echo "- ❌ **Documentation Deployment:** Failed" >> $GITHUB_STEP_SUMMARY
        fi
        
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 🎯 Protocol Management & Healing Platform:" >> $GITHUB_STEP_SUMMARY
        echo "- **🌐 Live Platform:** https://main.d45x824boqj7y.amplifyapp.com/" >> $GITHUB_STEP_SUMMARY
        echo "- **🔗 API Gateway:** https://suhoxvn8ik.execute-api.us-east-1.amazonaws.com/dev/" >> $GITHUB_STEP_SUMMARY
        echo "- **👤 Demo User:** patient@example.com / demo123456" >> $GITHUB_STEP_SUMMARY
        echo "- **🧠 AI Insights:** 117 correlation patterns" >> $GITHUB_STEP_SUMMARY
        echo "- **🏥 Multi-Protocol:** AIP + Low Histamine + Environmental" >> $GITHUB_STEP_SUMMARY
        
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "*Complete chronic illness recovery platform with automatic deployment!*" >> $GITHUB_STEP_SUMMARY