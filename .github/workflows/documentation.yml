name: 📚 Auto-Generate Documentation

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'frontend/**'
      - 'backend/**' 
      - 'docs/**'
      - '*.js'
      - '*.json'
  pull_request:
    branches: [ main ]
  workflow_dispatch: # Allow manual trigger

jobs:
  analyze-and-document:
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout Repository
      uses: actions/checkout@v4
      
    - name: 📦 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        
    - name: 🔧 Skip Root Dependencies
      run: |
        echo "✅ Using component-level package management (no root dependencies needed)"
        
    - name: 🔧 Install Shared Component Dependencies
      working-directory: ./frontend/shared
      run: npm ci
      
    - name: 🔧 Install Web App Dependencies  
      working-directory: ./frontend/web-app
      run: npm ci
      
    - name: 🔧 Install Documentation Dependencies
      working-directory: ./docs
      run: npm ci
      
    - name: 🔍 Generate Developer Documentation
      run: |
        # Run the new focused documentation generators
        node dev-api-docs-generator.js || echo "⚠️ API docs generation failed, continuing"
        node dev-codebase-docs-generator.js || echo "⚠️ Codebase docs generation failed, continuing"
        echo "✅ Developer documentation generated"
        
    - name: 📊 Generate Analysis Reports
      run: |
        # Create summary for GitHub Actions using the new focused data
        echo "## 📊 Platform Analysis Summary" >> $GITHUB_STEP_SUMMARY
        
        if [ -f "codebase-summary.json" ]; then
          echo "- **Components Found:** $(jq -r '.components.shared | length' codebase-summary.json)" >> $GITHUB_STEP_SUMMARY
          echo "- **Custom Hooks:** $(jq -r '.components.hooks | length' codebase-summary.json)" >> $GITHUB_STEP_SUMMARY
          echo "- **Project Type:** $(jq -r '.overview.type' codebase-summary.json)" >> $GITHUB_STEP_SUMMARY
        fi
        
        if [ -f "api-docs.json" ]; then
          WORKING_ENDPOINTS=$(jq -r '[.endpoints[] | .[]] | map(select(.working == true)) | length' api-docs.json)
          TOTAL_ENDPOINTS=$(jq -r '[.endpoints[] | .[]] | length' api-docs.json)
          echo "- **Working APIs:** ${WORKING_ENDPOINTS}/${TOTAL_ENDPOINTS}" >> $GITHUB_STEP_SUMMARY
        fi
        
        echo "- **Documentation Type:** Developer-focused (concise)" >> $GITHUB_STEP_SUMMARY
        echo "- **Analysis Date:** $(date)" >> $GITHUB_STEP_SUMMARY
        
    - name: 📋 Copy Documentation to Docs Site
      run: |
        # Copy the generated markdown files to the Docusaurus docs directory
        if [ -f "README.md" ]; then
          cp README.md docs/docs/quick-start.md
          echo "✅ Quick start guide copied"
        fi
        
        if [ -f "DEVELOPER_SETUP_GUIDE.md" ]; then
          cp DEVELOPER_SETUP_GUIDE.md docs/docs/development/setup-guide.md
          echo "✅ Setup guide copied"
        fi
        
        if [ -f "API_DEVELOPER_GUIDE.md" ]; then
          cp API_DEVELOPER_GUIDE.md docs/docs/api/developer-guide.md
          echo "✅ API guide copied"
        fi
        
    - name: 🏗️ Build Documentation Site
      working-directory: ./docs
      run: |
        npm run build
        echo "✅ Documentation site built"
        
    - name: 📋 Documentation Health Check
      working-directory: ./docs
      run: |
        # Check if key documentation files exist
        echo "🔍 Checking documentation completeness..."
        
        if [ -f "docs/quick-start.md" ]; then
          echo "✅ Quick start documentation generated"
        else
          echo "❌ Quick start documentation missing"
        fi
        
        if [ -f "docs/development/setup-guide.md" ]; then
          echo "✅ Development setup documentation generated"  
        else
          echo "❌ Development setup documentation missing"
        fi
        
        if [ -f "docs/api/developer-guide.md" ]; then
          echo "✅ API documentation generated"
        else
          echo "❌ API documentation missing"
        fi
        
        # Check build output
        if [ -d "build" ]; then
          echo "✅ Documentation site built successfully"
        else
          echo "❌ Documentation site build failed"
        fi
        
    - name: 📈 Upload Documentation Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: developer-documentation
        path: |
          README.md
          DEVELOPER_SETUP_GUIDE.md
          API_DEVELOPER_GUIDE.md
          api-docs.json
          codebase-summary.json
        retention-days: 30
        
    - name: 📄 Upload Documentation Build
      uses: actions/upload-artifact@v4
      with:
        name: documentation-site
        path: docs/build/
        retention-days: 7

  deploy-documentation:
    needs: analyze-and-document
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: 📥 Checkout Repository
      uses: actions/checkout@v4
      
    - name: 📦 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        
    - name: 📥 Download Documentation Build
      uses: actions/download-artifact@v4
      with:
        name: documentation-site
        path: docs/build/
        
    - name: 🔍 Detect Custom Domain
      id: domain
      run: |
        if [ -f "docs/static/CNAME" ]; then
          echo "custom_domain=$(cat docs/static/CNAME)" >> $GITHUB_OUTPUT
          echo "Custom domain detected: $(cat docs/static/CNAME)"
        elif [ -f "CNAME" ]; then
          echo "custom_domain=$(cat CNAME)" >> $GITHUB_OUTPUT
          echo "Custom domain detected: $(cat CNAME)"
        else
          echo "custom_domain=" >> $GITHUB_OUTPUT
          echo "No custom domain detected"
        fi
    
    - name: 🚀 Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./docs/build
        cname: ${{ steps.domain.outputs.custom_domain }}
        
    - name: 📊 Deployment Summary
      run: |
        echo "## 🚀 Documentation Deployment Summary" >> $GITHUB_STEP_SUMMARY
        echo "- **Status:** Successfully deployed to GitHub Pages" >> $GITHUB_STEP_SUMMARY
        echo "- **Documentation Type:** Developer-focused (clean & concise)" >> $GITHUB_STEP_SUMMARY
        
        # Dynamic URL based on repository and custom domain
        if [ -n "${{ steps.domain.outputs.custom_domain }}" ]; then
          echo "- **URL:** https://${{ steps.domain.outputs.custom_domain }}/" >> $GITHUB_STEP_SUMMARY
        else
          echo "- **URL:** https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/" >> $GITHUB_STEP_SUMMARY
        fi
        
        echo "- **Repository:** https://github.com/${{ github.repository }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Build Time:** $(date)" >> $GITHUB_STEP_SUMMARY
        echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY

  notify-completion:
    needs: [analyze-and-document, deploy-documentation]
    runs-on: ubuntu-latest
    if: always()
    
    steps:
    - name: 📋 Workflow Summary
      run: |
        echo "## 🎯 FILO Documentation Workflow Complete" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Results:" >> $GITHUB_STEP_SUMMARY
        
        if [ "${{ needs.analyze-and-document.result }}" == "success" ]; then
          echo "- ✅ **Developer Documentation Generation:** Success" >> $GITHUB_STEP_SUMMARY
        else
          echo "- ❌ **Developer Documentation Generation:** Failed" >> $GITHUB_STEP_SUMMARY
        fi
        
        if [ "${{ needs.deploy-documentation.result }}" == "success" ]; then
          echo "- ✅ **Documentation Deployment:** Success" >> $GITHUB_STEP_SUMMARY
        elif [ "${{ needs.deploy-documentation.result }}" == "skipped" ]; then
          echo "- ⏭️ **Documentation Deployment:** Skipped (not main branch)" >> $GITHUB_STEP_SUMMARY
        else
          echo "- ❌ **Documentation Deployment:** Failed" >> $GITHUB_STEP_SUMMARY
        fi
        
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Documentation Features:" >> $GITHUB_STEP_SUMMARY
        echo "- 🎯 **Developer-focused:** Clean, actionable guides" >> $GITHUB_STEP_SUMMARY
        echo "- 🚀 **Quick onboarding:** New developers can start immediately" >> $GITHUB_STEP_SUMMARY
        echo "- 📊 **Live API testing:** Automatically tests working endpoints" >> $GITHUB_STEP_SUMMARY
        echo "- 🔧 **Setup guides:** Complete development workflow documentation" >> $GITHUB_STEP_SUMMARY
        
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Next Steps:" >> $GITHUB_STEP_SUMMARY
        
        # Dynamic documentation URL
        if [ -f "docs/static/CNAME" ] || [ -f "CNAME" ]; then
          DOMAIN=$(cat docs/static/CNAME 2>/dev/null || cat CNAME 2>/dev/null)
          echo "1. 📖 Review documentation at: https://${DOMAIN}/" >> $GITHUB_STEP_SUMMARY
        else
          echo "1. 📖 Review documentation at: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/" >> $GITHUB_STEP_SUMMARY
        fi
        
        echo "2. 📊 Check developer guides in workflow artifacts" >> $GITHUB_STEP_SUMMARY
        echo "3. 🔧 Share setup guide with new team members" >> $GITHUB_STEP_SUMMARY